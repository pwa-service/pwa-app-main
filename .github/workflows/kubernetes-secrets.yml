name: Sync K8s Secrets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-secrets.yml'

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Sync pwa-secrets
        run: |
          kubectl create secret generic pwa-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=NODE_ENV="production" \
            --namespace=pwa \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync ghcr-secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ secrets.GHCR_USERNAME }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --docker-email="${{ secrets.GHCR_EMAIL }}" \
            --namespace=pwa \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify
        run: kubectl get secrets -n pwa
