name: Kubernetes Build and Push

on:
    workflow_dispatch:
        inputs:
            service:
                description: "Service to build"
                required: false
                default: "all"

env:
    REGISTRY: ghcr.io

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write

        strategy:
            matrix:
                service:
                    - name: auth-service
                      dockerfile: pwa-auth-service/Dockerfile
                    - name: event-handler
                      dockerfile: pwa-event-handler/Dockerfile
                    - name: logger-service
                      dockerfile: pwa-logger/Dockerfile
                    - name: api-gateway
                      dockerfile: pwa-api-gateway/Dockerfile
                    - name: pwa-manager
                      dockerfile: pwa-manager/Dockerfile
                    - name: org-service
                      dockerfile: pwa-org-service/Dockerfile
                    - name: domain-manager
                      dockerfile: pwa-domain-manager/Dockerfile
                    - name: pwa-builder
                      dockerfile: pwa-builder/Dockerfile
                    - name: prisma-migrator
                      dockerfile: pwa-prisma/Dockerfile

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GHCR_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.actor }}/${{ matrix.service.name }}
                  tags: |
                      type=sha,prefix=
                      type=raw,value=latest

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push ${{ matrix.service.name }}
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ${{ matrix.service.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.service.name }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

    apply-secrets:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Install kubectl
              uses: azure/setup-kubectl@v3

            - name: Configure kubectl
              run: |
                  mkdir -p ~/.kube
                  echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
                  chmod 600 ~/.kube/config

            - name: Apply Kubernetes Secrets
              run: |
                  kubectl create secret generic pwa-secrets \
                    --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                    --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
                    --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
                    --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
                    --from-literal=PGADMIN_DEFAULT_EMAIL="${{ secrets.PGADMIN_DEFAULT_EMAIL }}" \
                    --from-literal=PGADMIN_DEFAULT_PASSWORD="${{ secrets.PGADMIN_DEFAULT_PASSWORD }}" \
                    --from-literal=MAIL_USER="${{ secrets.MAIL_USER }}" \
                    --from-literal=MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
                    --from-literal=MAIL_FROM="${{ secrets.MAIL_FROM }}" \
                    --from-literal=TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
                    --from-literal=SFTP_HOST="${{ secrets.SFTP_HOST }}" \
                    --from-literal=SFTP_USER="${{ secrets.SFTP_USER }}" \
                    --from-literal=SFTP_PASSWORD="${{ secrets.SFTP_PASSWORD }}" \
                    --namespace=pwa \
                    --dry-run=client -o yaml | kubectl apply -f -

            - name: Apply Docker Registry Secret
              run: |
                  kubectl create secret docker-registry ghcr-secret \
                    --docker-server=ghcr.io \
                    --docker-username=${{ github.actor }} \
                    --docker-password=${{ secrets.GHCR_TOKEN }} \
                    --namespace=pwa \
                    --dry-run=client -o yaml | kubectl apply -f -

    deploy:
        runs-on: ubuntu-latest
        needs: apply-secrets
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install kubectl
              uses: azure/setup-kubectl@v3

            - name: Configure kubectl
              run: |
                  mkdir -p ~/.kube
                  echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
                  chmod 600 ~/.kube/config

            - name: Apply namespace
              run: |
                  kubectl apply -f kubernetes-app/namespace.yml

            - name: Apply external services
              run: |
                  kubectl apply -f kubernetes-app/services/external/

            - name: Apply RBAC
              run: |
                  kubectl apply -f kubernetes-app/rbac/

            - name: Run prisma migrations
              run: |
                  kubectl delete job prisma-migrator -n pwa --ignore-not-found
                  kubectl apply -f kubernetes-app/jobs/prisma-migrator.yml
                  kubectl wait --for=condition=complete job/prisma-migrator -n pwa --timeout=120s

            - name: Deploy services
              run: |
                  kubectl apply -f kubernetes-app/deployments/

            - name: Apply ingress
              run: |
                  kubectl apply -f kubernetes-app/ingress/

            - name: Verify deployment
              run: |
                  kubectl rollout status deployment/auth-service -n pwa
                  kubectl rollout status deployment/api-gateway -n pwa
                  kubectl rollout status deployment/event-handler -n pwa
                  kubectl rollout status deployment/pwa-manager -n pwa
                  kubectl rollout status deployment/org-service -n pwa
                  kubectl rollout status deployment/domain-manager -n pwa
                  kubectl rollout status deployment/logger-service -n pwa
                  kubectl rollout status deployment/pwa-builder -n pwa
