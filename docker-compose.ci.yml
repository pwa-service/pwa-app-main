services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pwa_test
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d pwa_test" ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - redis_test_data:/data

  prisma-migrator-test:
    build:
      context: .
      dockerfile: pwa-prisma/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/pwa_test?schema=public
    depends_on:
      postgres-test:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "npx prisma migrate deploy" ]

  auth-tests:
    build:
      context: .
      dockerfile: pwa-auth-service/Dockerfile.test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/pwa_test?schema=public
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
    depends_on:
      prisma-migrator-test:
        condition: service_completed_successfully
      redis-test:
        condition: service_healthy

  event-handler-tests:
    build:
      context: .
      dockerfile: pwa-event-handler/Dockerfile.test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/pwa_test?schema=public
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
    depends_on:
      prisma-migrator-test:
        condition: service_completed_successfully
      redis-test:
        condition: service_healthy

  org-service-tests:
    build:
      context: .
      dockerfile: pwa-org-service/Dockerfile.test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/pwa_test?schema=public
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      AUTH_SERVICE_GRPC_URL: auth-service-grpc:50051
    depends_on:
      prisma-migrator-test:
        condition: service_completed_successfully
      redis-test:
        condition: service_healthy
      auth-service-grpc:
        condition: service_healthy

  auth-service-grpc:
    build:
      context: .
      dockerfile: pwa-auth-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/pwa_test?schema=public
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      AUTH_SERVICE_GRPC_URL: 0.0.0.0:50051
      PORT: 4040
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"const net = require('net'); const s = net.createConnection(50051, 'localhost'); s.on('connect', () => { s.end(); process.exit(0); }); s.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 2000);\"" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    depends_on:
      prisma-migrator-test:
        condition: service_completed_successfully
      redis-test:
        condition: service_healthy

volumes:
  postgres_test_data:
  redis_test_data:
